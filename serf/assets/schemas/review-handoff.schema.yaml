$schema: "https://json-schema.org/draft/2020-12/schema"
title: Serf review handoff
type: object
required:
  - project_id
  - agent_id
  - executed_task_version
  - submission_status
  - task_package_path
  - files_reviewed
  - completed_work
  - outputs
  - validation
  - lord_invocation
properties:
  project_id:
    type: string
  agent_id:
    type: string
    pattern: "^Agent-[A-Z][0-9]*-[0-9]{2,}$"
  executed_task_version:
    type: string
  submission_status:
    enum: [REVIEW]
  task_package_path:
    type: string
  files_reviewed:
    type: array
    items:
      type: string
  completed_work:
    type: array
    items:
      type: string
  outputs:
    type: array
    items:
      type: string
  validation:
    type: object
  human_summary:
    type: string
  lord_invocation:
    type: string
  runtime_used:
    type: object
    properties:
      conda_env_path:
        type: string
      conda_env_name:
        type: string
      python_executable:
        type: string
      activation_command:
        type: string
      python_version:
        type: string
    additionalProperties: true
  assumptions:
    type: array
    items:
      type: string
  risks:
    type: array
    items:
      type: string
  incomplete_items:
    type: array
    items:
      type: string
additionalProperties: true
