$schema: "https://json-schema.org/draft/2020-12/schema"
title: Serf micro review handoff
type: object
required:
  - protocol_version
  - profile
  - project_id
  - agent_id
  - executed_task_version
  - submitted_at
  - submission_type
  - task_package_path
  - changed
  - result
  - validation
  - issues
  - report_path
properties:
  protocol_version:
    const: "0.2"
  profile:
    const: micro
  project_id:
    type: string
    minLength: 1
  agent_id:
    type: string
    pattern: "^Agent-[A-Z][0-9]*-[0-9]{2,}$"
  executed_task_version:
    oneOf:
      - type: string
        minLength: 1
      - type: integer
        minimum: 1
  submitted_at:
    type: string
    minLength: 1
  submission_type:
    const: REVIEW
  task_package_path:
    type: string
    minLength: 1
  changed:
    type: array
    items:
      type: string
  result:
    type: array
    minItems: 1
    items:
      type: string
  validation:
    type: object
    minProperties: 1
    maxProperties: 3
    patternProperties:
      "^AC-[0-9]{2,}$":
        type: object
        required: [result, evidence]
        properties:
          result:
            enum: [PASS, FAIL, SKIPPED]
          evidence:
            type: string
            minLength: 1
        additionalProperties: false
    additionalProperties: false
  issues:
    type: array
    items:
      type: string
  report_path:
    type: string
    minLength: 1
additionalProperties: false
