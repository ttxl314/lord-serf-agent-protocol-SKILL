$schema: "https://json-schema.org/draft/2020-12/schema"
title: Lord micro task package
type: object
required:
  - protocol_version
  - profile
  - project_id
  - agent_id
  - task_version
  - updated_at
  - status
  - objective
  - inputs
  - allowed_changes
  - expected_outputs
  - acceptance
  - validation
  - depends_on
  - inherits
  - return_path
properties:
  protocol_version:
    const: "0.2"
  profile:
    const: micro
  project_id:
    type: string
    minLength: 1
  agent_id:
    type: string
    pattern: "^Agent-[A-Z][0-9]*-[0-9]{2,}$"
  task_version:
    oneOf:
      - type: string
        minLength: 1
      - type: integer
        minimum: 1
  updated_at:
    type: string
    minLength: 1
  status:
    enum: [PENDING, READY, REWORK, CANCELLED]
  objective:
    type: string
    minLength: 1
  inputs:
    type: array
    items:
      type: string
  allowed_changes:
    type: array
    maxItems: 2
    items:
      type: string
  expected_outputs:
    type: array
    minItems: 1
    items:
      type: string
  acceptance:
    type: object
    minProperties: 1
    maxProperties: 3
    patternProperties:
      "^AC-[0-9]{2,}$":
        oneOf:
          - type: string
            minLength: 1
          - type: object
            required: [description]
            properties:
              description:
                type: string
                minLength: 1
            additionalProperties: true
    additionalProperties: false
  validation:
    type: array
    items:
      type: string
  depends_on:
    type: array
    items:
      type: string
  inherits:
    type: array
    items:
      type: string
  return_path:
    type: string
    minLength: 1
additionalProperties: false
