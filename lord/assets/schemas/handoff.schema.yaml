$schema: "https://json-schema.org/draft/2020-12/schema"
title: Cross-platform agent handoff
type: object
required:
  - project_id
  - agent_id
  - executed_task_version
  - submission_status
  - task_package_path
  - completed_work
  - outputs
properties:
  project_id:
    type: string
  agent_id:
    type: string
  executed_task_version:
    type: string
  submission_status:
    enum: [REVIEW]
  task_package_path:
    type: string
  completed_work:
    type: array
    items:
      type: string
  outputs:
    type: array
    items:
      type: string
  validation:
    type: object
  assumptions:
    type: array
    items:
      type: string
  risks:
    type: array
    items:
      type: string
  blockers:
    type: array
    items:
      type: string
  requested_master_decision:
    type: string
additionalProperties: true
